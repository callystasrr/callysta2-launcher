name: Build Callysta2 Launcher EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: PyInstaller kur
        run: pip install pyinstaller

      - name: EXE derle
        run: pyinstaller --onefile --windowed --name "Callysta2Launcher" launcher.py

      - name: EXE yükle
        uses: actions/upload-artifact@v4
        with:
          name: Callysta2Launcher
          path: dist/Callysta2Launcher.exe

      - name: Release oluştur
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "Callysta2 Launcher v1.0.${{ github.run_number }}"
          files: dist/Callysta2Launcher.exe
          body: |
            ## Callysta2 Launcher
            1. Callysta2Launcher.exe indir
            2. Çalıştır
            3. Gameforge Metin2 klasörünü seç
            4. "Sunucuya Bağla" butonuna bas
            5. Oyna!
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
