name: Build ve Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: PyInstaller kur
        run: pip install pyinstaller

      - name: EXE derle
        run: pyinstaller --onefile --windowed --name "Callysta2Launcher" launcher.py

      - name: Release oluştur (EXE + Client Parçaları)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "Callysta2 v1.0.${{ github.run_number }}"
          files: |
            dist/Callysta2Launcher.exe
            client_parts/Callysta2Client.zip.part01
            client_parts/Callysta2Client.zip.part02
            client_parts/Callysta2Client.zip.part03
            client_parts/Callysta2Client.zip.part04
            client_parts/Callysta2Client.zip.part05
          body: |
            ## ⚔ Callysta2 Launcher
            **Callysta2Launcher.exe** dosyasını indir ve çalıştır.
            Geri kalan her şeyi otomatik yapar!
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
